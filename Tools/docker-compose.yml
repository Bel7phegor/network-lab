version: '3.8'

services:
  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "65534:65534"  
    ports:
      - "9090:9090"
    volumes:
      - /data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /data/prometheus/rules/:/etc/prometheus/rules/
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://prometheus.anphuc.site'
    networks:
      - monitoring
    restart: unless-stopped

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    user: "65534:65534" 
    ports:
      - "9093:9093"
    volumes:
      - /data/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - /data/alertmanager/templates:/etc/alertmanager/templates
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://prometheus.anphuc.site/alertmanager'
    networks:
      - monitoring
    restart: unless-stopped
  
  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-renderer
    ports:
      - "8081"
    environment:
      ENABLE_METRICS: "true"
    networks:
      - monitoring
    restart: unless-stopped  
  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - renderer
    environment:
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_LOG_FILTERS=rendering:debug
      - GF_SECURITY_ADMIN_PASSWORD=Anphuc@1231
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false  
      - GF_SERVER_DOMAIN=grafana.anphuc.site
      - GF_SERVER_ROOT_URL=https://grafana.anphuc.site
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: 
      - -config.file=/etc/loki/loki-config.yaml
    volumes:
      - /data/loki/config/loki-config.yaml:/etc/loki/loki-config.yaml 
      - loki-data:/loki
      - /data/loki/rules:/loki/rules
    networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: unless-stopped
    privileged: true

  # SNMP Exporter
  snmp_exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp_exporter
    ports:
      - "9116:9116"
    volumes:
      - /data/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
    volumes:
      - /var/log:/var/log:ro
      - /data/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro  
      - /var/lib/docker/containers:/var/lib/docker/containers:ro 
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/prometheus  
  grafana-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/grafana  
  loki-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/loki  
  alertmanager-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/alertmanager  

networks:
  monitoring:
    driver: bridge
