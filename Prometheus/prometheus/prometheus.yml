# my global config
global:
  scrape_interval: 15s      # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s  # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - path_prefix: /alertmanager
      static_configs:
        - targets:
          - 192.168.254.254:9093
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - rules/alert-rules.yml
  - rules/nginx-rules.yml
  - rules/backup-rules.yml
  - rules/pfsense-rules.yml
  - rules/network-traffic.rules.yml
  - rules/security.rules.yml
  - rules/system.rules.yml
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  - job_name: "nginx-vts"
    static_configs:
      - targets:
        - "192.168.254.110:9113"
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "monitoring-server"
    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.
    static_configs:
      - targets: 
        - "192.168.254.254:9090"
        - "192.168.254.254:9100"

  - job_name: "network"
    static_configs:
      - targets: 
        - "192.168.254.1"
        labels:
          job: 'switch-dmz'
      - targets: 
        - "10.10.10.2"
        labels:
          job: 'SW-L3-KA'
      - targets: 
        - "10.10.20.2"
        labels:
          job: 'SW-L3-KB'

    metrics_path: /snmp
    params:
      module: [if_mib, cisco_device, system]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.254.254:9116

  - job_name: "pfsense-fw"
    static_configs:
      - targets: 
        - "10.10.30.1"
    metrics_path: /snmp
    params:
      module: [if_mib, system, pfsense]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.254.254:9116

  - job_name: 'teleport-server'
    static_configs:
      - targets:
        - "192.168.254.100:9100"
          #        - "192.168.254.100:9113"
  
  - job_name: 'web-server'
    scrape_interval: 
    static_configs:
      - targets: ['192.168.254.110:9100']
