groups:
- name: interface-alert.rules
  rules:
  - alert: InterfaceDown
    expr: ifOperStatus{ifDescr!~"^(lo|pf.*|pflog.*)"} == 2 
    for: 1m
    labels:
      severity: critical
      alert_type: interface_status
    annotations:
      summary: "Interface DOWN: {{ $labels.ifDescr }} on {{ $labels.instance }}"
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} is DOWN (AdminStatus={{ $labels.ifAdminStatus }})"


