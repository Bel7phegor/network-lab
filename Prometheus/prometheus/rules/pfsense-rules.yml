groups:
- name: memory-usage-alerts
  rules:
  - alert: MemoryUsageNotice
    expr: 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) > 60 and 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) <= 70
    for: 10m
    labels:
      severity: 'notice'
    annotations:
      summary: "Memory usage notice ({{ $value | humanize }}%) on {{ $labels.instance }}"
      description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }} (Notice threshold: 60-70%)"

  - alert: MemoryUsageWarning
    expr: 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) > 70 and 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) <= 80
    for: 5m
    labels:
      severity: 'warning'
    annotations:
      summary: "High memory usage warning ({{ $value | humanize }}%) on {{ $labels.instance }}"
      description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }} (Warning threshold: 71-80%)"

  - alert: MemoryUsageCritical
    expr: 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) > 80 and 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) <= 90
    for: 3m
    labels:
      severity: 'critical'
    annotations:
      summary: "Critical memory usage ({{ $value | humanize }}%) on {{ $labels.instance }}"
      description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }} (Critical threshold: 81-90%)"

  - alert: MemoryUsageEmergency
    expr: 100 - ((memAvailReal{job!=""} / memTotalReal{job!=""}) * 100) > 90
    for: 1m
    labels:
      severity: 'emergency'
    annotations:
      summary: "EXTREME memory usage ({{ $value | humanize }}%) on {{ $labels.instance }}"
      description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }} (Emergency threshold: >90%)"
