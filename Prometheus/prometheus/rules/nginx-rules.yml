groups:
- name: nginx-alerts
  rules:
  - alert: NginxDown
    expr: nginx_up == 0
    for: 1m
    labels:
      severity: critical
      service: nginx
      alert_type: service 
    annotations:
      summary: "Nginx is DOWN ({{ $labels.instance }})"
      description: "Nginx service is unavailable."
      impact: "Web services down"
      action: "Check: systemctl status nginx"
