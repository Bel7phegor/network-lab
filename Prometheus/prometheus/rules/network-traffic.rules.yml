groups:
- name: network-traffic-alerts
  rules:
 
  - alert: HighInboundTrafficWarning
    expr: irate(ifHCInOctets{ifName!~"lo|veth.*"}[5m]) * 8 > 500000 
    for: 1m  
    labels:
      severity: warning
      alert_type: network_traffic
      direction: in
    annotations:
      summary: "High inbound traffic (Warning)"
      description: "Interface {{ $labels.ifName }} traffic > 500kbps (Current: {{ $value | humanize }}bps)"
      value: "{{ $value | humanize }}bps" 
      threshold: "500kbps"

  
  - alert: HighInboundTrafficCritical
    expr: irate(ifHCInOctets{ifName!~"lo|veth.*"}[5m]) * 8 > 1000000 
    for: 1m
    labels:
      severity: critical
      alert_type: network_traffic
      direction: in
    annotations:
      summary: "High inbound traffic (CRITICAL)"
      description: "Interface {{ $labels.ifName }} traffic > 1Mbps (Current: {{ $value | humanize }}bps)"
      value: "{{ $value | humanize }}bps"
      threshold: "1Mbps"

  - alert: HighOutboundTrafficWarning
    expr: irate(ifHCOutOctets{ifName!~"lo|veth.*"}[5m]) * 8 > 500000 
    for: 1m
    labels:
      severity: warning
      alert_type: network_traffic
      direction: out
    annotations:
      summary: "High outbound traffic (Warning)"
      description: "Interface {{ $labels.ifName }} traffic > 500kbps (Current: {{ $value | humanize }}bps)"
      value: "{{ $value | humanize }}bps"
      threshold: "500kbps"


  - alert: HighOutboundTrafficCritical
    expr: irate(ifHCOutOctets{ifName!~"lo|veth.*"}[5m]) * 8 > 1000000 
    for: 1m
    labels:
      severity: critical
      alert_type: network_traffic
      direction: out
    annotations:
      summary: "High outbound traffic (CRITICAL)"
      description: "Interface {{ $labels.ifName }} traffic > 1Mbps (Current: {{ $value | humanize }}bps)"
      value: "{{ $value | humanize }}bps"
      threshold: "1Mbps"


  - alert: NetworkTrafficAnomaly
    expr: |
      (
        irate(ifHCInOctets{ifName!~"lo|veth.*"}[5m]) * 8 > 
        (avg(irate(ifHCInOctets{ifName!~"lo|veth.*"}[5m] offset 7d)) by (ifName) * 8 * 3) + 10000
      )
    for: 5m
    labels:
      severity: warning
      alert_type: network_anomaly
    annotations:
      summary: "Abnormal traffic pattern detected"
      description: "Traffic on {{ $labels.ifName }} is 3x higher than last week + buffer."
