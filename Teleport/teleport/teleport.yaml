version: v3
teleport:
  nodename: teleport.anphuc.site
  data_dir: /var/lib/teleport
  log:
    output: stderr
    severity: INFO

auth_service:
  enabled: yes
  cluster_name: teleport.anphuc.site
  listen_addr: 0.0.0.0:3025

proxy_service:
  enabled: yes
  public_addr: teleport.anphuc.site:443
  listen_addr: 0.0.0.0:3023
  web_listen_addr: 0.0.0.0:443

ssh_service:
  enabled: yes
  labels:
    env: dev
